<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Light / Black Mode</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5e6b7f;
      --line: #d8dee9;
      --accent: #1f6feb;
      --accent-text: #ffffff;
      --shadow: 0 18px 50px rgba(23, 32, 51, 0.12);
    }

    [data-theme="black"] {
      color-scheme: dark;
      --bg: #050608;
      --panel: #11151d;
      --text: #f2f5f9;
      --muted: #a7b0bf;
      --line: #2a3240;
      --accent: #f2f5f9;
      --accent-text: #050608;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      transition: background-color 180ms ease, color 180ms ease;
    }

    main {
      width: min(92vw, 520px);
      padding: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
      transition: background-color 180ms ease, border-color 180ms ease;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 26px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    button {
      min-width: 148px;
      min-height: 44px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 10px 16px;
      background: var(--accent);
      color: var(--accent-text);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    button:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 35%, transparent);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <h1 id="title">라이트 모드</h1>
    <p id="description">버튼을 누르면 블랙 모드로 전환됩니다.</p>
    <button id="themeToggle" type="button">블랙 모드</button>
  </main>

  <script>
    const root = document.documentElement;
    const title = document.getElementById("title");
    const description = document.getElementById("description");
    const button = document.getElementById("themeToggle");
    const storageKey = "carstudioTheme";

    function applyTheme(theme) {
      const nextTheme = theme === "black" ? "black" : "light";
      const isBlack = nextTheme === "black";
      root.dataset.theme = nextTheme;
      localStorage.setItem(storageKey, nextTheme);
      title.textContent = isBlack ? "블랙 모드" : "라이트 모드";
      description.textContent = isBlack
        ? "버튼을 누르면 라이트 모드로 전환됩니다."
        : "버튼을 누르면 블랙 모드로 전환됩니다.";
      button.textContent = isBlack ? "라이트 모드" : "블랙 모드";
      button.setAttribute("aria-label", button.textContent + "로 전환");
    }

    button.addEventListener("click", () => {
      applyTheme(root.dataset.theme === "black" ? "light" : "black");
    });

    applyTheme(localStorage.getItem(storageKey));
  </script>
</body>
</html>
