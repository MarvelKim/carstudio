<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Car Studio Random Picker</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --panel-strong: #111318;
      --text: #111318;
      --muted: #657181;
      --line: #d8dee6;
      --control-bg: #111318;
      --control-text: #ffffff;
      --control-muted: #c4ccd8;
      --control-subtle: #aab3c1;
      --field-bg: #090b10;
      --field-border: #384152;
      --field-text: #ffffff;
      --result-bg: #f9fafb;
      --stage-bg: linear-gradient(180deg, #fdfefe 0%, #edf1f6 100%);
      --frame-bg: #ffffff;
      --meta-bg: #fbfcfe;
      --accent: #0f6bff;
      --accent-dark: #0849b6;
      --accent-soft: #eaf2ff;
      --shadow: 0 18px 55px rgba(15, 28, 45, 0.13);
    }

    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #07090d;
      --panel: #11151d;
      --panel-strong: #05070a;
      --text: #f4f7fb;
      --muted: #9aa6b6;
      --line: #293241;
      --control-bg: #05070a;
      --control-text: #ffffff;
      --control-muted: #cbd5e1;
      --control-subtle: #97a3b5;
      --field-bg: #111722;
      --field-border: #354155;
      --field-text: #f8fafc;
      --result-bg: #0d1118;
      --stage-bg: linear-gradient(180deg, #151b25 0%, #090d13 100%);
      --frame-bg: #0a0e14;
      --meta-bg: #161c27;
      --accent: #4b8dff;
      --accent-dark: #2f6fdc;
      --accent-soft: #152640;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 34px 18px;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(360px, 1.08fr);
      min-height: calc(100vh - 68px);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .control {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 32px;
      padding: 34px;
      background: var(--control-bg);
      color: var(--control-text);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 42px;
    }

    .brand strong {
      font-size: 15px;
      letter-spacing: 0;
    }

    .count {
      color: var(--control-subtle);
      font-size: 13px;
      white-space: nowrap;
    }

    .brand-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-toggle {
      position: relative;
      width: 58px;
      height: 32px;
      min-height: 32px;
      border: 1px solid var(--field-border);
      border-radius: 999px;
      padding: 3px;
      background: #ffffff;
      color: #111318;
      cursor: pointer;
      transition: background 180ms ease, border-color 180ms ease;
    }

    .theme-toggle[data-theme="dark"] {
      background: #111318;
      color: #ffffff;
    }

    .theme-toggle:hover {
      background: #ffffff;
    }

    .theme-toggle[data-theme="dark"]:hover {
      background: #111318;
    }

    .theme-toggle:focus-visible {
      outline: 3px solid rgba(106, 161, 255, 0.42);
      outline-offset: 3px;
    }

    .theme-sun {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 50%;
      transform: translateX(0);
      transition: transform 180ms ease, color 180ms ease;
    }

    .theme-toggle[data-theme="dark"] .theme-sun {
      transform: translateX(26px);
    }

    .theme-sun::before {
      content: "";
      position: absolute;
      inset: 7px;
      background: currentColor;
      border-radius: 50%;
      box-shadow:
        0 -6px 0 -2px currentColor,
        4px -4px 0 -2px currentColor,
        6px 0 0 -2px currentColor,
        4px 4px 0 -2px currentColor,
        0 6px 0 -2px currentColor,
        -4px 4px 0 -2px currentColor,
        -6px 0 0 -2px currentColor,
        -4px -4px 0 -2px currentColor;
    }

    .theme-sun::after {
      content: "";
      position: absolute;
      inset: 3px;
      border: 2px solid currentColor;
      border-radius: 50%;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(27px, 4.8vw, 51px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .mobile-join {
      display: none;
    }

    .lead {
      max-width: 430px;
      margin: 0 0 30px;
      color: var(--control-muted);
      font-size: 16px;
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 12px;
      max-width: 470px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--control-muted);
      font-size: 13px;
      font-weight: 700;
    }

    .profile-row,
    .input-row {
      display: grid;
      gap: 10px;
    }

    .profile-row {
      grid-template-columns: 1fr;
    }

    .birthdate-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 0.72fr) minmax(0, 0.72fr);
      gap: 10px;
    }

    .input-row {
      grid-template-columns: 1fr auto;
    }

    input,
    select {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--field-border);
      border-radius: 6px;
      padding: 12px 14px;
      background-color: var(--field-bg);
      color: var(--field-text);
      font: inherit;
      font-size: 16px;
    }

    select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #c4ccd8 50%), linear-gradient(135deg, #c4ccd8 50%, transparent 50%);
      background-position: calc(100% - 18px) 20px, calc(100% - 12px) 20px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 36px;
    }

    input:focus,
    select:focus {
      outline: 3px solid rgba(15, 107, 255, 0.35);
      border-color: #6aa1ff;
    }

    button {
      min-height: 48px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 11px 16px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      white-space: nowrap;
    }

    button:hover { background: var(--accent-dark); }
    button:focus-visible { outline: 3px solid rgba(106, 161, 255, 0.42); outline-offset: 3px; }

    .shuffle {
      display: inline-grid;
      grid-template-columns: 20px auto;
      align-items: center;
      gap: 8px;
    }

    .shuffle svg { width: 20px; height: 20px; }

    .hint {
      min-height: 22px;
      color: var(--control-subtle);
      font-size: 13px;
    }

    .history {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .history button {
      min-height: 34px;
      border-color: #343d4c;
      padding: 7px 10px;
      background: transparent;
      color: #d7dde7;
      font-size: 12px;
      font-weight: 700;
    }

    .result {
      display: grid;
      grid-template-rows: minmax(280px, 1fr) auto;
      min-height: 100%;
      background: var(--result-bg);
    }

    .image-stage {
      display: grid;
      place-items: center;
      padding: 42px 28px 22px;
      background: var(--stage-bg);
    }

    .image-frame {
      width: min(100%, 590px);
      aspect-ratio: 16 / 10;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--frame-bg);
      overflow: hidden;
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 16px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .image-frame img.ready {
      opacity: 1;
      transform: translateY(0);
    }

    .placeholder {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
    }

    .details {
      display: grid;
      gap: 18px;
      padding: 28px 32px 34px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }

    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .car-name {
      margin: 0;
      color: var(--text);
      font-size: clamp(24px, 4vw, 43px);
      line-height: 1.05;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .meta div {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: var(--meta-bg);
    }

    .meta strong {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .meta span {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    @media (max-width: 860px) {
      main { padding: 0; }
      .shell { grid-template-columns: 1fr; min-height: 100vh; border: 0; border-radius: 0; }
      .control { padding: 26px 18px; }
      .brand { margin-bottom: 28px; }
      .profile-row,
      .input-row { grid-template-columns: 1fr; }
      .birthdate-row {
        grid-template-columns: minmax(0, 1fr) minmax(0, 0.72fr) minmax(0, 0.72fr);
      }
      button { width: 100%; }
      .history button { width: auto; }
      .result { min-height: 520px; }
      .details { padding: 24px 18px 28px; }
      .meta { grid-template-columns: 1fr; }
      h1 {
        font-size: clamp(21px, 6.4vw, 27px);
        white-space: nowrap;
      }
      h1 br { display: none; }
      .mobile-join { display: inline; }
    }
  </style>
</head>

  <main>
    <section class="shell" aria-label="랜덤 차량 추천기">
      <div class="control">
        <div>
          <div class="brand">
            <strong>Car Studio</strong>
            <div class="brand-actions">
              <span class="count" id="countText"></span>
              <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to dark mode" aria-pressed="false" data-theme="light">
                <span class="theme-sun" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <h1>생애 한 번뿐인<br><span class="mobile-join"> </span>랜덤 자동차</h1>
          <p class="lead">같은 이름은 같은 차량으로 다시 연결됩니다.</p>
          <form id="pickerForm">
            <div class="profile-row">
              <label for="genderSelect">성별
                <select id="genderSelect" required>
                  <option value="">선택</option>
                  <option value="male">남자</option>
                  <option value="female">여자</option>
                </select>
              </label>
              <div class="birthdate-row">
                <label for="birthYearSelect">출생연도
                  <select id="birthYearSelect" required>
                    <option value="">선택</option>
                  </select>
                </label>
                <label for="birthMonthSelect">월
                  <select id="birthMonthSelect" required>
                    <option value="">선택</option>
                  </select>
                </label>
                <label for="birthDaySelect">일
                  <select id="birthDaySelect" required>
                    <option value="">선택</option>
                  </select>
                </label>
              </div>
            </div>
            <label for="seedInput">이름
              <div class="input-row">
                <input id="seedInput" type="text" autocomplete="off" placeholder="예: 홍길동, car2026, 85A" required>
                <button class="shuffle" type="submit" aria-label="차량 뽑기">
                  <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/></svg>
                  <span>차량 뽑기</span>
                </button>
              </div>
            </label>
            <div class="hint" id="hintText"></div>
          </form>
        </div>
        <ul class="history" id="historyList" aria-label="최근 이름"></ul>
      </div>

      <div class="result">
        <div class="image-stage">
          <div class="image-frame" id="imageFrame">
            <div class="placeholder" id="placeholder">이름을 입력하면 차량 사진이 표시됩니다.</div>
            <img id="carImage" alt="" hidden>
          </div>
        </div>
        <div class="details">
          <div>
            <p class="eyebrow">추천 차량</p>
            <h2 class="car-name" id="carName">아직 선택되지 않음</h2>
          </div>
          <div class="meta">
            <div><strong>이름</strong><span id="seedText">-</span></div>
            <div><strong>성별</strong><span id="genderText">-</span></div>
            <div><strong>생년월일</strong><span id="birthYearText">-</span></div>
            <div><strong>매칭 번호</strong><span id="matchText">-</span></div>
          </div>
        </div>
      </div>
    </section>
  </main>

    const seedText = document.getElementById("seedText");
    const genderText = document.getElementById("genderText");
    const birthYearText = document.getElementById("birthYearText");
    const matchText = document.getElementById("matchText");
    const countText = document.getElementById("countText");
    const historyList = document.getElementById("historyList");
    const themeToggle = document.getElementById("themeToggle");
    const storageKey = "carstudioRecentSeeds";
    const themeStorageKey = "carstudioTheme";

    function applyTheme(theme) {
      const nextTheme = theme === "dark" ? "dark" : "light";
      document.documentElement.dataset.theme = nextTheme;
      themeToggle.dataset.theme = nextTheme;
      themeToggle.setAttribute("aria-pressed", String(nextTheme === "dark"));
      themeToggle.setAttribute("aria-label", nextTheme === "dark" ? "Switch to light mode" : "Switch to dark mode");
      localStorage.setItem(themeStorageKey, nextTheme);
    }

    applyTheme(localStorage.getItem(themeStorageKey) || "light");

    localStorage.removeItem(storageKey);
    historyList.innerHTML = "";
    countText.textContent = cars.length.toLocaleString("ko-KR") + "개 모델";

    for (let year = 2026; year >= 1940; year -= 1) {
      const option = document.createElement("option");
      option.value = String(year);
      option.textContent = year + "년생";
      birthYearSelect.appendChild(option);
    }

    for (let month = 1; month <= 12; month += 1) {
      const option = document.createElement("option");
      option.value = String(month);
      option.textContent = month + "월";
      birthMonthSelect.appendChild(option);
    }

    for (let day = 1; day <= 31; day += 1) {
      const option = document.createElement("option");
      option.value = String(day);
      option.textContent = day + "일";
      birthDaySelect.appendChild(option);
    }

    function hashSeed(value) {
      let hash = 2166136261;
      for (const char of value.normalize("NFKC")) {
        hash ^= char.codePointAt(0);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function pickCar(profileSeed) {
      const hash = hashSeed(profileSeed);
      return { car: cars[hash % cars.length], index: hash % cars.length };
    }

    function renderPick(seed) {
      const trimmed = seed.trim();
      const gender = genderSelect.value;
      const birthYear = birthYearSelect.value;
      const birthMonth = birthMonthSelect.value;
      const birthDay = birthDaySelect.value;

      if (!gender) {
        hintText.textContent = "성별을 먼저 선택해주세요.";
        genderSelect.focus();
        return;
      }

      if (!birthYear) {
        hintText.textContent = "출생연도를 먼저 선택해주세요.";
        birthYearSelect.focus();
        return;
      }

      if (!birthMonth) {
        hintText.textContent = "출생월을 먼저 선택해주세요.";
        birthMonthSelect.focus();
        return;
      }

      if (!birthDay) {
        hintText.textContent = "출생일을 먼저 선택해주세요.";
        birthDaySelect.focus();
        return;
      }

      if (!trimmed) {
        hintText.textContent = "이름을 먼저 넣어주세요.";
        input.focus();
        return;
      }

      const profileSeed = [gender, birthYear, birthMonth, birthDay, trimmed].join("|");
      const { car, index } = pickCar(profileSeed);
      hintText.textContent = "같은 성별, 생년월일, 이름은 항상 같은 차량으로 연결됩니다.";
      carName.textContent = car.name;
      seedText.textContent = trimmed;
      genderText.textContent = gender === "male" ? "남자" : "여자";
      birthYearText.textContent = birthYear + "년 " + birthMonth + "월 " + birthDay + "일";
      matchText.textContent = "#" + String(index + 1).padStart(3, "0");
      placeholder.hidden = true;
      carImage.hidden = false;
      carImage.classList.remove("ready");
      carImage.alt = car.name + " 차량 이미지";
      carImage.src = car.image;
    }

    carImage.addEventListener("load", () => {
      carImage.classList.add("ready");
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      renderPick(input.value);
    });

    themeToggle.addEventListener("click", () => {
      applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
    });
  </script>
</body>
</html>
