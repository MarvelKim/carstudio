    const GAME_PROFILES=[['city','mini|smart|500|mirage|spark|picanto',.72,.82],['hatch','golf|jazz|rio|yaris|leaf|zoe|208|ibiza',.84,.88],['hot-hatch','type r|gti|golf r|focus rs|i30 n',.88,.82],['compact-sedan','a3|civic|corolla|elantra|forte|sentra|jetta|cla',.94,.78],['sedan','a4|a5|accord|camry|sonata|k5|g70|c-class|3 series',1,.76],['luxury-sedan','a6|a7|a8|g80|g90|s-class|7 series|lexus ls|panamera',1.08,.78],['fastback','stinger|arteon|ioniq 6|model s|model 3',1.04,.72],['wagon','wagon|avant|touring|outback|cross turismo|leon st',1.08,.78],['coupe','coupe|brz|gr86|supra|mustang|camaro|challenger|gt-r',.98,.66],['supercar','lamborghini|ferrari|mclaren|r8|911|amg gt|revuelto|huracan',1,.58],['convertible','convertible|cabriolet|roadster|boxster|spyder|targa',.98,.58],['crossover','kona|niro|kicks|venue|ux|hr-v|crosstrek|taos|captur',.92,.92],['compact-suv','q3|q5|rav4|cr-v|tucson|sportage|tiguan|cx-5|glc|x3',1,1],['midsize-suv','sorento|santa fe|highlander|pilot|passport|rx|gle|cayenne|model x',1.08,1.06],['large-suv','q7|q8|palisade|telluride|yukon|expedition|armada|sequoia|gls',1.15,1.12],['offroad','wrangler|bronco|g-class|defender|4runner|recon|avenger',1.02,1.12],['pickup','pickup|f-150|ranger|maverick|tacoma|tundra|frontier|ridgeline|gladiator|santa cruz|cybertruck|r1t|r2t',1.18,.92],['minivan','carnival|odyssey|sienna|minivan|mpv',1.12,1.08],['van','van|transit|sprinter',1.16,1.15],['electric-suv','ev9|ioniq 5|model y|bz4x|ariya|id.4|ev6|mach-e|prologue|solterra',1.04,.98]];
    const profile=(()=>{let n=carData.name.toLowerCase();return GAME_PROFILES.find(p=>new RegExp(p[1]).test(n))||GAME_PROFILES[4]})();
    const tx=k=>T[lang][k]||T.en[k]||k,fmt=n=>n<1000?`${Math.max(0,n).toFixed(n<100?1:0)} m`:`${(n/1000).toFixed(2)} km`;
    function applyLang(){document.documentElement.lang=lang;document.querySelectorAll('[data-t]').forEach(e=>e.textContent=tx(e.dataset.t));$('#langSelect').value=lang;updateLaunchText();updateItemQueue(true);$('#best').textContent=fmt(best)}
    function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);if(phase==='angle'||phase==='power')car.y=ground()-car.h/2}
    // The dashed lane marker is the single source of truth for wheel contact, items and collisions.
    const roadTop=()=>H-Math.max(105,H*.16),ground=()=>roadTop()+42,worldToScreen=x=>x-camera,worldY=y=>y;
    function seedRandom(n){const x=Math.sin(n*999.71+carData.index*31.7)*43758.5453;return x-Math.floor(x)}
    function buildObstacles(){obstacles=[];let x=950,previousHalf=0;for(let i=0;i<260;i++){let r=seedRandom(i+300),type=r<.32?'energy':r<.52?'sky':r<.76?'honey':'trap';if(i<3&&type==='trap')type=i===1?'sky':'energy';let w=(type==='trap'?86:76)*ITEM_SCALE,h=(type==='trap'?76:type==='sky'?34:48)*ITEM_SCALE,half=w/2;x+=previousHalf+half+360+seedRandom(i)*720;obstacles.push({x,type,variant:seedRandom(i+700)>.5?1:0,used:false,w,h});previousHalf=half}}
    const itemIcon=o=>o.type==='energy'?(o.variant?'🔋':'⛽'):o.type==='sky'?'🚀':o.type==='honey'?'🍯':o.variant?'🌳':'🌵';
    function updateItemQueue(force=false){let next=obstacles.filter(o=>!o.used&&o.x+o.w/2>=car.x-car.w/2).slice(0,5),signature=next.map(o=>`${o.x}:${o.type}:${o.variant}`).join('|')+`:${lang}`;if(!force&&signature===itemQueueSignature)return;itemQueueSignature=signature;let queue=$('#itemQueue');queue.replaceChildren();if(!next.length){let empty=document.createElement('span');empty.className='item-empty';empty.textContent=tx('noItems');queue.append(empty);return}next.forEach((o,index)=>{let slot=document.createElement('span'),number=document.createElement('small');slot.className=`item-slot ${o.type}`;slot.textContent=itemIcon(o);slot.title=tx(o.type);slot.setAttribute('aria-label',`${index+1}. ${tx(o.type)}`);number.className='item-number';number.textContent=index+1;slot.append(number);queue.append(slot)})}
    function reset(){cancelAnimationFrame(raf);phase='angle';paused=false;angle=.45;angleDir=1;power=0;powerDir=1;holding=false;camera=0;time=0;blocked=false;bounces=0;rolling=false;truckX=-360;hitFlash=0;particles=[];car.x=180;car.y=ground()-car.h/2;car.vx=car.vy=car.vr=car.rot=0;buildObstacles();itemQueueSignature='';updateItemQueue(true);$('#altitude').classList.remove('show');$('#resultOverlay').classList.add('hidden');$('#pauseOverlay').classList.add('hidden');$('#launchUi').classList.remove('hidden');$('#meterFill').style.width='0%';$('#distance').textContent=fmt(0);updateLaunchText();last=performance.now();raf=requestAnimationFrame(loop)}
    function updateLaunchText(){if(!$)return;let powerMode=phase==='power';$('#instruction').textContent=tx(powerMode?'powerHelp':'angleHelp');$('#holdBtn').textContent=tx(powerMode?'powerButton':'angleButton')}
    function startHold(e){e.preventDefault();if(phase==='angle'){phase='power';updateLaunchText();return}if(phase==='power')holding=true}
    function endHold(e){if(e)e.preventDefault();if(phase==='power'&&holding){holding=false;launch()}}
    function launch(){phase='truck';$('#launchUi').classList.add('hidden');truckX=-380;setTimeout(()=>{if(phase!=='truck')return;phase='flight';rolling=false;lastEffectAt=-99;let speed=(520+power*720)*LAUNCH_SPEED_MULTIPLIER;car.vx=speed*Math.cos(angle);car.vy=-speed*Math.sin(angle);car.vr=6+power*10;burst(car.x-50,ground()-25,'#ffd23f',28);hitFlash=1},620/LAUNCH_SPEED_MULTIPLIER)}
    function burst(x,y,color,count=14){for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*330,vy:-Math.random()*260,life:.45+Math.random()*.5,color,size:3+Math.random()*7})}
    function toast(key){if(key==='groundHit'&&time-lastEffectAt<1.2)return;let el=$('#toast');el.textContent=tx(key);el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1500)}
    const carVerticalRadius=rotation=>Math.abs(Math.sin(rotation))*car.w/2+Math.abs(Math.cos(rotation))*car.h/2;
    function collide(o,fromX=car.x){if(o.used)return false;let reach=(o.w+car.w)*.45,crossed=o.x>=Math.min(fromX,car.x)-reach&&o.x<=Math.max(fromX,car.x)+reach;if(crossed&&car.y+carVerticalRadius(car.rot)*.85>ground()-o.h){o.used=true;lastEffectAt=time;if(o.type==='trap'){rolling=false;car.vx*=.16;car.vy=-Math.max(260,Math.min(900,car.vx*.08));toast('trapHit');burst(car.x,ground()-40,'#ff4d4d',35)}else if(o.type==='honey'){car.vx*=.55;car.vy*=.7;toast('honeyHit');burst(car.x,ground()-20,'#f4b942',24)}else if(o.type==='sky'){rolling=false;let forwardSpeed=car.vx;car.vy=-360*ITEM_EFFECT_MULTIPLIER;car.vx=Math.max(forwardSpeed,900);car.vr=Math.max(MIN_AIR_SPIN,Math.abs(car.vr));toast('skyHit');burst(car.x,ground()-30,'#b96cff',90);hitFlash=1;$('#altitude').classList.add('show')}else{rolling=false;car.vx=Math.min(MAX_PLAYABLE_SPEED,car.vx*(1+.18*ITEM_EFFECT_MULTIPLIER));car.vy-=18*ITEM_EFFECT_MULTIPLIER;car.vr=Math.max(MIN_AIR_SPIN,Math.abs(car.vr));toast('energyHit');burst(car.x,ground()-28,o.variant?'#63d8ff':'#ffd23f',70);hitFlash=.7}updateItemQueue(true);return true}return false}
    function physics(dt){
      time+=dt;
      if(phase==='angle'){
        angle+=angleDir*dt*1.18;
        if(angle>.98||angle<.25){angle=Math.max(.25,Math.min(.98,angle));angleDir*=-1}
      }else if(phase==='power'){
        power+=powerDir*dt*1.35;
        if(power>1||power<0){power=Math.max(0,Math.min(1,power));powerDir*=-1}
        $('#meterFill').style.width=(power*100)+'%';
      }else if(phase==='truck'){
        truckX+=dt*920*LAUNCH_SPEED_MULTIPLIER;
        if(truckX>130)truckX=130;
      }else if(phase==='flight'){
        let previousX=car.x;
        if(!rolling){
          car.vy+=720*dt;
          let spinDirection=car.vr<0?-1:1;
          car.vr=spinDirection*Math.max(MIN_AIR_SPIN,Math.abs(car.vr)*Math.pow(.9995,dt*60));
          car.rot+=car.vr*dt;
        }else{
          car.vr*=Math.pow(.86,dt*60);
          car.rot+=car.vr*dt;
          let settleTarget=Math.round(car.rot/(Math.PI*2))*Math.PI*2;
          car.rot+=(settleTarget-car.rot)*Math.min(1,dt*8);
        }
        car.x+=Math.max(0,car.vx)*dt;
        car.y+=car.vy*dt;
        car.vx*=Math.pow(rolling?.965:.999,dt*60);
        let floorRadius=carVerticalRadius(car.rot);
        if(rolling){
          car.y=ground()-floorRadius;
          if(car.vx<STOP_SPEED)finish(false);
        }else if(car.y+floorRadius>=ground()){
          car.y=ground()-floorRadius;
          let impactSpeed=Math.max(0,car.vy),shouldBounce=car.vx>MIN_BOUNCE_SPEED||impactSpeed>MIN_BOUNCE_IMPACT;
          if(shouldBounce){
            let bounceLift=Math.min(MAX_BOUNCE_LIFT,Math.max(MIN_BOUNCE_LIFT,impactSpeed*BOUNCE_RESTITUTION));
            car.vy=-bounceLift;
            car.vx*=.88;
            car.vr=(car.vr<0?-1:1)*Math.max(MIN_AIR_SPIN,Math.abs(car.vr)+.35);
            bounces++;
            burst(car.x,ground()-8,'#d59d61');
            toast('groundHit');
          }else{
            rolling=true;
            car.vy=0;
          }
        }
        obstacles.forEach(o=>collide(o,previousX));
        let cameraTarget=Math.max(0,car.x-W*.38);
        camera+=(cameraTarget-camera)*Math.min(1,dt*6);
        let airborne=Math.max(0,ground()-carVerticalRadius(car.rot)-car.y),altitude=airborne*.11,offscreen=car.y+carVerticalRadius(car.rot)<72;
        $('#altitude').textContent=`↑ ${fmt(altitude)}`;
        $('#altitude').classList.toggle('show',offscreen);
        updateItemQueue();
        let dist=Math.max(0,(car.x-180)*.11);
        $('#distance').textContent=fmt(dist);
      }
    }
    function finish(crushed){if(phase==='result')return;phase='result';let dist=Math.max(0,(car.x-180)*.11),isNew=dist>best;if(isNew){best=dist;localStorage.setItem('carstudioSkyBest',String(best))}$('#best').textContent=fmt(best);$('#finalDistance').textContent=fmt(dist);$('#newRecord').textContent=tx(isNew?'newRecord':'record').replace('{d}',fmt(best));$('#resultCopy').textContent=tx('resultText').replace('{car}',carData.name).replace('{d}',fmt(dist));$('#resultOverlay').classList.remove('hidden');$('#shareBtn').dataset.distance=fmt(dist)}
    function rounded(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}
    function drawSpeedLines(){if(phase!=='flight'||car.vx<700)return;ctx.save();let intensity=Math.min(1,car.vx/9000);ctx.globalAlpha=.12+.18*intensity;ctx.fillStyle='#fff';for(let i=0;i<9;i++){let y=55+seedRandom(i+810)*(H-150),len=20+seedRandom(i+850)*95,x=((seedRandom(i+890)*W-time*(180+seedRandom(i)*420))%(W+180)+W+180)%(W+180);ctx.beginPath();ctx.ellipse(x,y,len,1.2+seedRandom(i+910)*1.8,0,0,Math.PI*2);ctx.fill()}ctx.restore()}
    function drawSky(){const p=['#72d8ff','#eafaff','#8bd5a6','#45bd84'];let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,p[0]);g.addColorStop(1,p[1]);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.72)';for(let i=0;i<7;i++){let x=((i*370-camera*.08)%(W+440))-130,y=80+(i%3)*82,s=22+seedRandom(i)*24;ctx.beginPath();ctx.arc(x,y,s,0,7);ctx.arc(x+s,y-10,s*1.25,0,7);ctx.arc(x+s*2.1,y,s*.85,0,7);ctx.fill()}let layers=[{c:p[2],s:.09,y:roadTop()-130},{c:p[3],s:.18,y:roadTop()-72}];layers.forEach((l,j)=>{ctx.fillStyle=l.c;ctx.beginPath();ctx.moveTo(0,H);for(let x=-100;x<W+120;x+=120){let wx=x+camera*l.s,hh=55+seedRandom(Math.floor(wx/120)+j*99)*100;ctx.lineTo(x,l.y-hh);ctx.quadraticCurveTo(x+60,l.y-hh-35,x+120,l.y)}ctx.lineTo(W,H);ctx.fill()});ctx.fillStyle='#f3d69d';ctx.fillRect(0,roadTop(),W,H-roadTop());ctx.fillStyle='#26364f';ctx.fillRect(0,roadTop(),W,9);ctx.strokeStyle='#fffdf0';ctx.lineWidth=6;ctx.setLineDash([45,35]);ctx.lineDashOffset=-(camera%80);ctx.beginPath();ctx.moveTo(0,ground());ctx.lineTo(W,ground());ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=.18;ctx.fillStyle='#8a6b45';for(let i=0;i<16;i++){let x=((i*149-camera*.7)%(W+80)+W+80)%(W+80)-40;ctx.fillRect(x,ground()+25+(i%3)*13,28+(i%4)*18,3)}ctx.globalAlpha=1}
    function drawObstacle(o){if(o.used)return;let x=worldToScreen(o.x);if(x<-180||x>W+180)return;ctx.save();ctx.translate(x,ground()-o.h*.48);ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='76px "Segoe UI Emoji","Apple Color Emoji",sans-serif';ctx.shadowColor='rgba(20,33,61,.35)';ctx.shadowBlur=4;ctx.shadowOffsetY=3;ctx.fillText(itemIcon(o),0,0);ctx.restore()}
    function drawCar(x,y,rot,scale=1){ctx.save();ctx.translate(x,y+CAR_ROAD_OFFSET);ctx.rotate(rot);ctx.scale(scale*(carSprite.flip?-1:1),scale);if(carSprite.canvas||carImg.complete&&carImg.naturalWidth){let image=carSprite.canvas||carImg,iw=image.width||image.naturalWidth,ih=image.height||image.naturalHeight,ratio=Math.min(car.w/iw,car.h/ih),dw=iw*ratio,dh=ih*ratio;ctx.filter='drop-shadow(2px 0 #14213d) drop-shadow(-2px 0 #14213d) drop-shadow(0 2px #14213d) drop-shadow(0 -2px #14213d) saturate(1.15) contrast(1.05)';ctx.drawImage(image,-dw/2,car.h/2-dh,dw,dh)}else{let bw=car.w*profile[2],bh=car.h*profile[3];ctx.fillStyle=carColor;ctx.strokeStyle='#14213d';ctx.lineWidth=4;rounded(-bw/2,car.h/2-bh,bw,bh,Math.min(15,bh*.28));ctx.fill();ctx.stroke()}ctx.restore()}
    function drawTruck(){let x=truckX,y=ground()-54;ctx.save();ctx.translate(x,y);ctx.fillStyle='#ffcf33';ctx.strokeStyle='#14213d';ctx.lineWidth=4;rounded(-110,-45,150,70,8);ctx.fill();ctx.stroke();ctx.fillStyle='#ff6b35';rounded(30,-34,85,59,8);ctx.fill();ctx.stroke();ctx.fillStyle='#8fe2ff';ctx.fillRect(50,-24,40,24);ctx.strokeRect(50,-24,40,24);ctx.fillStyle='#14213d';[ -70,65].forEach(v=>{ctx.beginPath();ctx.arc(v,25,18,0,7);ctx.fill()});ctx.fillStyle='#14213d';ctx.font='1000 17px sans-serif';ctx.fillText('LAUNCH!',-95,-5);ctx.restore()}
    function drawOffscreenCar(){let radius=carVerticalRadius(car.rot),altitude=Math.max(0,(ground()-radius-car.y)*.11);if(phase!=='flight'||car.y+radius+CAR_ROAD_OFFSET>=72)return;let x=Math.max(70,Math.min(W-70,worldToScreen(car.x)));ctx.save();ctx.translate(x,72);ctx.fillStyle='#ff3038';ctx.strokeStyle='#14213d';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(0,-42);ctx.lineTo(34,-4);ctx.lineTo(15,-4);ctx.lineTo(15,28);ctx.lineTo(-15,28);ctx.lineTo(-15,-4);ctx.lineTo(-34,-4);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#14213d';ctx.font='1000 21px sans-serif';ctx.textAlign='center';ctx.fillText(fmt(altitude),0,55);ctx.restore()}
    function render(){ctx.clearRect(0,0,W,H);drawSky();drawSpeedLines();obstacles.forEach(drawObstacle);particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(worldToScreen(p.x),worldY(p.y),p.size,p.size)});ctx.globalAlpha=1;if(phase==='angle'||phase==='power'||phase==='truck'){drawCar(180,ground()-car.h/2,0);drawTruck();if(phase==='angle'||phase==='power'){ctx.save();ctx.translate(180,ground()-car.h/2+CAR_ROAD_OFFSET);ctx.rotate(-angle);ctx.scale(.85,1);ctx.strokeStyle='#ff4d4d';ctx.fillStyle='#ff4d4d';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(200,0);ctx.stroke();ctx.beginPath();ctx.moveTo(210,0);ctx.lineTo(166,-22);ctx.lineTo(166,22);ctx.closePath();ctx.fill();ctx.restore()}}else if(worldY(car.y)+carVerticalRadius(car.rot)+CAR_ROAD_OFFSET>=72)drawCar(worldToScreen(car.x),worldY(car.y),car.rot);drawOffscreenCar();if(hitFlash>0){ctx.fillStyle=`rgba(255,255,255,${hitFlash*.7})`;ctx.fillRect(0,0,W,H);hitFlash*=.82}}
    function loop(now){let dt=Math.min(.033,(now-last)/1000||0);last=now;if(!paused){physics(dt);particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=420*dt;p.life-=dt});particles=particles.filter(p=>p.life>0)}render();raf=requestAnimationFrame(loop)}
    function togglePause(force){if(phase==='result'||phase==='angle'||phase==='power')return;paused=force===undefined?!paused:force;$('#pauseOverlay').classList.toggle('hidden',!paused)}
    async function share(){let d=$('#shareBtn').dataset.distance,text=tx('shareText').replace('{car}',carData.name).replace('{d}',d);try{if(navigator.share)await navigator.share({title:'Car Studio · Sky Launch',text,url:location.href});else{await navigator.clipboard.writeText(text+' '+location.href);toast('copied')}}catch(e){}}
    $('#holdBtn').addEventListener('pointerdown',startHold);window.addEventListener('pointerup',endHold);$('#retryBtn').onclick=reset;$('#againBtn').onclick=reset;$('#pauseBtn').onclick=()=>togglePause();$('#resumeBtn').onclick=()=>togglePause(false);$('#backBtn').onclick=()=>{if(history.length>1)history.back();else location.href='index.html'};$('#shareBtn').onclick=share;$('#langSelect').onchange=e=>{lang=e.target.value;localStorage.setItem('carstudioGameLang',lang);applyLang()};window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();if(e.repeat)return;startHold(e)}if(e.key==='Escape')togglePause()});window.addEventListener('keyup',e=>{if(e.code==='Space')endHold(e)});window.addEventListener('resize',resize);resize();applyLang();$('#best').textContent=fmt(best);reset();
  })();
