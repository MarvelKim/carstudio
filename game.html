    const GAME_PROFILES=[['city','mini|smart|500|mirage|spark|picanto',.72,.82],['hatch','golf|jazz|rio|yaris|leaf|zoe|208|ibiza',.84,.88],['hot-hatch','type r|gti|golf r|focus rs|i30 n',.88,.82],['compact-sedan','a3|civic|corolla|elantra|forte|sentra|jetta|cla',.94,.78],['sedan','a4|a5|accord|camry|sonata|k5|g70|c-class|3 series',1,.76],['luxury-sedan','a6|a7|a8|g80|g90|s-class|7 series|lexus ls|panamera',1.08,.78],['fastback','stinger|arteon|ioniq 6|model s|model 3',1.04,.72],['wagon','wagon|avant|touring|outback|cross turismo|leon st',1.08,.78],['coupe','coupe|brz|gr86|supra|mustang|camaro|challenger|gt-r',.98,.66],['supercar','lamborghini|ferrari|mclaren|r8|911|amg gt|revuelto|huracan',1,.58],['convertible','convertible|cabriolet|roadster|boxster|spyder|targa',.98,.58],['crossover','kona|niro|kicks|venue|ux|hr-v|crosstrek|taos|captur',.92,.92],['compact-suv','q3|q5|rav4|cr-v|tucson|sportage|tiguan|cx-5|glc|x3',1,1],['midsize-suv','sorento|santa fe|highlander|pilot|passport|rx|gle|cayenne|model x',1.08,1.06],['large-suv','q7|q8|palisade|telluride|yukon|expedition|armada|sequoia|gls',1.15,1.12],['offroad','wrangler|bronco|g-class|defender|4runner|recon|avenger',1.02,1.12],['pickup','pickup|f-150|ranger|maverick|tacoma|tundra|frontier|ridgeline|gladiator|santa cruz|cybertruck|r1t|r2t',1.18,.92],['minivan','carnival|odyssey|sienna|minivan|mpv',1.12,1.08],['van','van|transit|sprinter',1.16,1.15],['electric-suv','ev9|ioniq 5|model y|bz4x|ariya|id.4|ev6|mach-e|prologue|solterra',1.04,.98]];

    function finish(crushed){if(phase==='result')return;phase='result';let dist=Math.max(0,(car.x-180)*.11),isNew=dist>best;if(isNew){best=dist;localStorage.setItem('carstudioSkyBest',String(best))}$('#best').textContent=fmt(best);$('#finalDistance').textContent=fmt(dist);$('#newRecord').textContent=tx(isNew?'newRecord':'record').replace('{d}',fmt(best));$('#resultCopy').textContent=tx('resultText').replace('{car}',carData.name).replace('{d}',fmt(dist));$('#resultOverlay').classList.remove('hidden');$('#shareBtn').dataset.distance=fmt(dist)}
    function rounded(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}
    function drawSky(){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#72d8ff');g.addColorStop(1,'#eafaff');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.85)';for(let i=0;i<8;i++){let x=((i*330-camera*.08)%(W+400))-120,y=100+(i%3)*90;ctx.beginPath();ctx.arc(x,y,34,0,7);ctx.arc(x+38,y-12,45,0,7);ctx.arc(x+84,y,30,0,7);ctx.fill()}let layers=[{c:'#8bd5a6',s:.09,y:ground()-130},{c:'#45bd84',s:.18,y:ground()-72}];layers.forEach((l,j)=>{ctx.fillStyle=l.c;ctx.beginPath();ctx.moveTo(0,H);for(let x=-100;x<W+120;x+=120){let wx=x+camera*l.s,hh=55+seedRandom(Math.floor(wx/120)+j*99)*100;ctx.lineTo(x,l.y-hh);ctx.quadraticCurveTo(x+60,l.y-hh-35,x+120,l.y)}ctx.lineTo(W,H);ctx.fill()});ctx.fillStyle='#f3d69d';ctx.fillRect(0,ground(),W,H-ground());ctx.fillStyle='#26364f';ctx.fillRect(0,ground(),W,9);ctx.strokeStyle='#fff7d6';ctx.lineWidth=6;ctx.setLineDash([45,35]);ctx.beginPath();ctx.moveTo(0,ground()+42);ctx.lineTo(W,ground()+42);ctx.stroke();ctx.setLineDash([])}
    function drawObstacle(o){let x=worldToScreen(o.x),y=ground();if(x<-120||x>W+120||o.used)return;ctx.save();ctx.translate(x,y);ctx.lineWidth=3;ctx.strokeStyle='#14213d';if(o.type==='spring'){ctx.fillStyle='#35c78a';rounded(-38,-25,76,25,6);ctx.fill();ctx.stroke();ctx.strokeStyle='#fff';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-25,-10);ctx.lineTo(0,-22);ctx.lineTo(25,-10);ctx.stroke()}else if(o.type==='boost'){ctx.fillStyle='#ffd23f';rounded(-38,-18,76,18,5);ctx.fill();ctx.stroke();ctx.fillStyle='#ff4d4d';ctx.beginPath();ctx.moveTo(-20,-8);ctx.lineTo(12,-14);ctx.lineTo(1,-7);ctx.lineTo(22,-4);ctx.lineTo(-10,-1);ctx.closePath();ctx.fill()}else if(o.type==='oil'){ctx.fillStyle='#273043';ctx.beginPath();ctx.ellipse(0,-5,42,11,0,0,7);ctx.fill();ctx.fillStyle='#ffcf33';ctx.font='900 20px sans-serif';ctx.fillText('!',-4,-20)}else{ctx.fillStyle='#e8edf2';rounded(-42,-70,84,70,6);ctx.fill();ctx.stroke();ctx.fillStyle='#ff4d4d';for(let i=-28;i<=28;i+=28){ctx.beginPath();ctx.moveTo(i-10,-70);ctx.lineTo(i,-88);ctx.lineTo(i+10,-70);ctx.fill();ctx.stroke()}ctx.fillStyle='#14213d';ctx.font='900 22px sans-serif';ctx.fillText('☠',-13,-25)}ctx.restore()}
    function drawCar(x,y,rot,scale=1){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.scale(scale,scale);ctx.shadowColor='rgba(20,33,61,.25)';ctx.shadowBlur=10;ctx.shadowOffsetY=7;rounded(-car.w/2,-car.h/2,car.w,car.h,14);ctx.clip();if(carImg.complete&&carImg.naturalWidth){ctx.save();ctx.scale(-1,1);ctx.filter='saturate(1.3) contrast(1.08)';let iw=carImg.naturalWidth,ih=carImg.naturalHeight,ratio=Math.max(car.w/iw,car.h/ih);ctx.drawImage(carImg,-iw*ratio/2,-ih*ratio/2,iw*ratio,ih*ratio);ctx.restore()}else{let bw=car.w*profile[2],bh=car.h*profile[3];ctx.fillStyle=carColor;rounded(-bw/2,-bh/2,bw,bh,Math.min(15,bh*.28));ctx.fill();ctx.fillStyle='rgba(205,239,255,.86)';ctx.beginPath();ctx.moveTo(-bw*.22,-bh*.42);ctx.lineTo(bw*.18,-bh*.42);ctx.lineTo(bw*.34,-bh*.04);ctx.lineTo(-bw*.36,-bh*.04);ctx.closePath();ctx.fill();ctx.fillStyle='#fff4a8';ctx.fillRect(bw*.42,-5,8,10)}ctx.restore();ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.scale(scale,scale);ctx.lineWidth=4;ctx.strokeStyle='#14213d';rounded(-car.w/2,-car.h/2,car.w,car.h,14);ctx.stroke();ctx.fillStyle='#14213d';for(let wx of [-35,35]){ctx.beginPath();ctx.arc(wx,car.h/2-1,13,0,7);ctx.fill();ctx.fillStyle='#cfd8e3';ctx.beginPath();ctx.arc(wx,car.h/2-1,5,0,7);ctx.fill();ctx.fillStyle='#14213d'}ctx.restore()}
    function drawTruck(){let x=truckX,y=ground()-54;ctx.save();ctx.translate(x,y);ctx.fillStyle='#ffcf33';ctx.strokeStyle='#14213d';ctx.lineWidth=4;rounded(-110,-45,150,70,8);ctx.fill();ctx.stroke();ctx.fillStyle='#ff6b35';rounded(30,-34,85,59,8);ctx.fill();ctx.stroke();ctx.fillStyle='#8fe2ff';ctx.fillRect(50,-24,40,24);ctx.strokeRect(50,-24,40,24);ctx.fillStyle='#14213d';[ -70,65].forEach(v=>{ctx.beginPath();ctx.arc(v,25,18,0,7);ctx.fill()});ctx.fillStyle='#14213d';ctx.font='1000 17px sans-serif';ctx.fillText('LAUNCH!',-95,-5);ctx.restore()}
    function render(){ctx.clearRect(0,0,W,H);drawSky();obstacles.forEach(drawObstacle);particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(worldToScreen(p.x),worldY(p.y),p.size,p.size)});ctx.globalAlpha=1;if(phase==='angle'||phase==='power'||phase==='truck'){drawCar(180,ground()-car.h/2,0);drawTruck();if(phase==='angle'||phase==='power'){ctx.save();ctx.translate(180,ground()-95);ctx.rotate(-angle);ctx.strokeStyle='#ff4d4d';ctx.fillStyle='#ff4d4d';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(100,0);ctx.stroke();ctx.beginPath();ctx.moveTo(105,0);ctx.lineTo(82,-13);ctx.lineTo(82,13);ctx.closePath();ctx.fill();ctx.restore()}}else drawCar(worldToScreen(car.x),worldY(car.y),car.rot);if(hitFlash>0){ctx.fillStyle=`rgba(255,255,255,${hitFlash*.7})`;ctx.fillRect(0,0,W,H);hitFlash*=.82}}
    function loop(now){let dt=Math.min(.033,(now-last)/1000||0);last=now;if(!paused){physics(dt);particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=420*dt;p.life-=dt});particles=particles.filter(p=>p.life>0)}render();raf=requestAnimationFrame(loop)}
    function togglePause(force){if(phase==='result'||phase==='angle'||phase==='power')return;paused=force===undefined?!paused:force;$('#pauseOverlay').classList.toggle('hidden',!paused)}
    async function share(){let d=$('#shareBtn').dataset.distance,text=tx('shareText').replace('{car}',carData.name).replace('{d}',d);try{if(navigator.share)await navigator.share({title:'Car Studio · Sky Launch',text,url:location.href});else{await navigator.clipboard.writeText(text+' '+location.href);toast('copied')}}catch(e){}}
    $('#holdBtn').addEventListener('pointerdown',startHold);window.addEventListener('pointerup',endHold);$('#retryBtn').onclick=reset;$('#againBtn').onclick=reset;$('#pauseBtn').onclick=()=>togglePause();$('#resumeBtn').onclick=()=>togglePause(false);$('#backBtn').onclick=()=>{if(history.length>1)history.back();else location.href='index.html'};$('#shareBtn').onclick=share;$('#langSelect').onchange=e=>{lang=e.target.value;localStorage.setItem('carstudioGameLang',lang);applyLang()};window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();if(e.repeat)return;startHold(e)}if(e.key==='Escape')togglePause()});window.addEventListener('keyup',e=>{if(e.code==='Space')endHold(e)});window.addEventListener('resize',resize);resize();applyLang();$('#best').textContent=fmt(best);reset();
  })();
  </script>
