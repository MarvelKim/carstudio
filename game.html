<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Car Studio · Sky Launch</title>
  <style>
    :root{--ink:#14213d;--paper:#fffdf5;--yellow:#ffd23f;--red:#ff4d4d;--blue:#2f80ed;--green:#35c78a;--line:#14213d;--shadow:6px 6px 0 #14213d}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#9ee7ff;color:var(--ink);font-family:Inter,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;overflow-x:hidden}button,select{font:inherit}.top{position:fixed;z-index:20;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;gap:10px;pointer-events:none}.top>*{pointer-events:auto}.toolbar{display:flex;gap:8px;flex-wrap:wrap}.btn,.select{min-height:44px;border:3px solid var(--line);border-radius:12px;background:var(--paper);color:var(--ink);padding:8px 14px;font-weight:900;box-shadow:3px 3px 0 var(--line);cursor:pointer}.btn:hover{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--line)}.btn.primary{background:var(--yellow)}.stats{display:flex;gap:8px}.stat{min-width:125px;border:3px solid var(--line);border-radius:12px;background:var(--paper);padding:7px 12px;box-shadow:3px 3px 0 var(--line);text-align:right}.stat small{display:block;font-size:10px;font-weight:900;text-transform:uppercase}.stat strong{font-size:19px}#game{display:block;width:100vw;height:100vh;touch-action:none}.launch-ui{position:fixed;z-index:15;left:50%;bottom:28px;translate:-50% 0;width:min(480px,calc(100% - 28px));border:3px solid var(--line);border-radius:18px;background:rgba(255,253,245,.95);box-shadow:var(--shadow);padding:12px 16px}.launch-ui.hidden{display:none}.instruction{text-align:center;font-size:16px;font-weight:900}.hold{width:100%;margin-top:9px;min-height:50px;border:3px solid var(--line);border-radius:12px;background:var(--red);color:white;font-size:18px;font-weight:1000;box-shadow:4px 4px 0 var(--line);cursor:pointer;touch-action:none}.hold:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--line)}.overlay{position:fixed;z-index:30;inset:0;display:grid;place-items:center;padding:20px;background:rgba(20,33,61,.62);backdrop-filter:blur(5px)}.overlay.hidden{display:none}.card{width:min(520px,100%);border:4px solid var(--line);border-radius:20px;background:var(--paper);box-shadow:9px 9px 0 var(--line);padding:28px;text-align:center}.card .badge{display:inline-block;border:2px solid var(--line);border-radius:999px;background:var(--yellow);padding:5px 12px;font-weight:1000}.card h1{margin:14px 0 5px;font-size:clamp(34px,8vw,62px);line-height:1}.card p{line-height:1.6}.record{font-size:22px;font-weight:1000}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}.legend{position:fixed;z-index:12;left:14px;bottom:14px;display:flex;gap:7px;flex-wrap:wrap;max-width:620px}.chip{border:2px solid var(--line);border-radius:999px;background:rgba(255,253,245,.9);padding:5px 9px;font-size:11px;font-weight:900}.toast{position:fixed;z-index:25;top:90px;left:50%;translate:-50% -20px;opacity:0;border:3px solid var(--line);border-radius:12px;background:var(--paper);box-shadow:4px 4px 0 var(--line);padding:10px 16px;font-weight:1000;transition:.2s;pointer-events:none}.toast.show{opacity:1;translate:-50% 0}@media(max-width:650px){.top{top:7px;left:7px;right:7px}.btn,.select{min-height:38px;padding:6px 9px;font-size:12px}.stat{min-width:92px;padding:5px 7px}.stat strong{font-size:15px}.stat small{font-size:8px}.legend{display:none}.launch-ui{bottom:10px}.card{padding:20px}.actions{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="top">
    <div class="toolbar"><button class="btn" id="backBtn">← <span data-t="back">돌아가기</span></button><button class="btn" id="pauseBtn" data-t="pause">일시정지</button><button class="btn primary" id="retryBtn" data-t="retry">재도전</button><select class="select" id="langSelect" aria-label="Language"><option value="ko">한국어</option><option value="en">English</option><option value="ja">日本語</option><option value="zh">中文</option></select></div>
    <div class="stats"><div class="stat"><small data-t="distance">비행 거리</small><strong id="distance">0 m</strong></div><div class="stat"><small data-t="best">최고 기록</small><strong id="best">0 m</strong></div></div>
  </div>
  <canvas id="game" aria-label="Car launch game"></canvas>
  <div class="launch-ui" id="launchUi"><div class="instruction" id="instruction" data-t="angleHelp">누르고 있으면 방향이 고정되고 파워가 충전됩니다</div><button class="hold" id="holdBtn" data-t="angleButton">누르고 있다가 원하는 파워에서 떼기</button></div>
  <div class="legend"><span class="chip">🛢️ <span data-t="boost">터보 드럼통 ×45</span></span><span class="chip">⬆ <span data-t="spring">슈퍼 스프링 ×45</span></span><span class="chip">🛞 <span data-t="oil">오일: 다음 보너스 무효</span></span><span class="chip">☠ <span data-t="crusher">파쇄기: 즉시 종료</span></span></div>
  <div class="toast" id="toast"></div>
  <div class="overlay hidden" id="pauseOverlay"><div class="card"><span class="badge" data-t="paused">잠시 정차 중</span><h1 data-t="pausedTitle">PAUSED</h1><p data-t="pausedDesc">준비되면 다시 출발하세요.</p><button class="btn primary" id="resumeBtn" data-t="resume">계속하기</button></div></div>
  <div class="overlay hidden" id="resultOverlay"><div class="card"><span class="badge" data-t="result">주행 결과</span><h1 id="finalDistance">0 m</h1><div class="record" id="newRecord"></div><p id="resultCopy"></p><div class="actions"><button class="btn primary" id="againBtn" data-t="retry">재도전</button><button class="btn" id="shareBtn" data-t="share">기록 공유하기</button></div></div></div>
  <script>
  (()=>{
    'use strict';
    const T={ko:{back:'돌아가기',pause:'일시정지',retry:'재도전',distance:'비행 거리',best:'최고 기록',angleHelp:'화살표가 좋은 각도일 때 누르세요',angleButton:'각도 정하기',powerHelp:'누르고 있다가 최고의 힘에서 떼세요!',powerButton:'꾹 누르고 힘 모으기',spring:'슈퍼 스프링',boost:'니트로 부스트',oil:'오일: 다음 보너스 무효',crusher:'파쇄기: 즉시 종료',paused:'잠시 정차 중',pausedTitle:'PAUSED',pausedDesc:'준비되면 다시 출발하세요.',resume:'계속하기',result:'주행 결과',share:'기록 공유하기',newRecord:'신기록!',record:'기록: {d}',resultText:'{car}가 {d}를 날아갔어요!',shareText:'내 {car}가 Car Studio 멀리날리기에서 {d}를 기록했어요! 🚗💨',copied:'기록을 복사했어요!',springHit:'슈퍼 스프링! 하늘 높이!',boostHit:'니트로 부스트! 더 빠르게!',oilHit:'오일 함정! 다음 보너스 무효',blocked:'보너스가 오일 때문에 사라졌어요!',crusherHit:'파쇄기 충돌! 주행 종료',groundHit:'통통! 다시 날아갑니다'},en:{back:'Back',pause:'Pause',retry:'Retry',distance:'Distance',best:'Best',angleHelp:'Press when the arrow has a great angle',angleButton:'Set angle',powerHelp:'Hold, then release at maximum power!',powerButton:'Hold to charge power',spring:'Super spring',boost:'Nitro boost',oil:'Oil: blocks next bonus',crusher:'Crusher: instant finish',paused:'Pit stop',pausedTitle:'PAUSED',pausedDesc:'Resume when you are ready.',resume:'Resume',result:'Flight result',share:'Share record',newRecord:'New record!',record:'Record: {d}',resultText:'Your {car} flew {d}!',shareText:'My {car} flew {d} in Car Studio Sky Launch! 🚗💨',copied:'Record copied!',springHit:'Super spring! Sky high!',boostHit:'Nitro boost! Faster!',oilHit:'Oil trap! Next bonus blocked',blocked:'The oil trap cancelled the bonus!',crusherHit:'Crusher hit! Run over',groundHit:'Boing! Keep flying'},ja:{back:'戻る',pause:'一時停止',retry:'リトライ',distance:'飛距離',best:'ベスト',angleHelp:'良い角度でボタンを押そう',angleButton:'角度を決める',powerHelp:'長押しして最大パワーで離そう！',powerButton:'長押しでパワー',spring:'スーパーばね',boost:'ニトロブースト',oil:'オイル：次のボーナス無効',crusher:'クラッシャー：即終了',paused:'停車中',pausedTitle:'PAUSED',pausedDesc:'準備ができたら再開しよう。',resume:'続ける',result:'飛行結果',share:'記録を共有',newRecord:'新記録！',record:'記録：{d}',resultText:'{car}が{d}飛びました！',shareText:'Car Studioで{car}が{d}飛びました！🚗💨',copied:'記録をコピーしました！',springHit:'スーパーばね！高く飛べ！',boostHit:'ニトロ！もっと速く！',oilHit:'オイル！次のボーナス無効',blocked:'オイルでボーナスが消えた！',crusherHit:'クラッシャー衝突！終了',groundHit:'バウンド！まだ飛べる'},zh:{back:'返回',pause:'暂停',retry:'重试',distance:'飞行距离',best:'最佳纪录',angleHelp:'箭头角度合适时按下',angleButton:'确定角度',powerHelp:'按住蓄力，在最大力量时松开！',powerButton:'按住蓄力',spring:'超级弹簧',boost:'氮气加速',oil:'机油：抵消下一奖励',crusher:'粉碎机：立即结束',paused:'暂停中',pausedTitle:'PAUSED',pausedDesc:'准备好后继续出发。',resume:'继续',result:'飞行结果',share:'分享纪录',newRecord:'新纪录！',record:'纪录：{d}',resultText:'你的{car}飞了{d}！',shareText:'我的{car}在Car Studio飞了{d}！🚗💨',copied:'纪录已复制！',springHit:'超级弹簧！冲上天空！',boostHit:'氮气加速！更快！',oilHit:'机油陷阱！下一奖励无效',blocked:'奖励被机油抵消了！',crusherHit:'撞上粉碎机！游戏结束',groundHit:'弹起来！继续飞'}};
    let lang=localStorage.getItem('carstudioLanguage')||localStorage.getItem('carstudioGameLang')||((navigator.language||'ko').slice(0,2));if(lang.startsWith('zh'))lang='zh';if(!T[lang])lang='en';
    const $=s=>document.querySelector(s),canvas=$('#game'),ctx=canvas.getContext('2d'),carData=(()=>{try{return JSON.parse(localStorage.getItem('carstudioGameCar'))}catch(e){return null}})()||{name:'Mystery Car',image:'',index:0};
    const carImg=new Image();if(carData.image)carImg.src=carData.image;
    let W,H,dpr=1,last=0,raf,phase='angle',paused=false,angle=.62,angleDir=1,power=0,powerDir=1,holding=false,camera=0,time=0,obstacles=[],particles=[],best=+localStorage.getItem('carstudioSkyBest')||0,blocked=false,bounces=0,truckX=-360,hitFlash=0,boostFx=0,baseDistance=100,bonusDistance=0,distanceValue=0;
    const car={x:180,y:0,vx:0,vy:0,rot:0,vr:0,w:142,h:72};
    const tx=k=>T[lang][k]||T.en[k]||k,fmt=n=>n<1000?`${Math.max(0,n).toFixed(n<100?1:0)} m`:`${(n/1000).toFixed(2)} km`;
    function applyLang(){document.documentElement.lang=lang;document.querySelectorAll('[data-t]').forEach(e=>e.textContent=tx(e.dataset.t));$('#langSelect').value=lang;updateLaunchText();$('#best').textContent=fmt(best)}
    function resize(){dpr=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);if(phase==='angle'||phase==='power')car.y=ground()-car.h/2}
    const ground=()=>H-Math.max(105,H*.16),worldToScreen=x=>x-camera;
    function seedRandom(n){const x=Math.sin(n*999.71+carData.index*31.7)*43758.5453;return x-Math.floor(x)}
    function buildObstacles(){obstacles=[];let x=850;for(let i=0;i<140;i++){x+=430+seedRandom(i)*520;let r=seedRandom(i+300),type=r<.25?'spring':r<.52?'boost':r<.76?'oil':'crusher';if(i<2&&type==='crusher')type=i?'boost':'spring';obstacles.push({x,type,used:false,w:type==='crusher'?82:70,h:type==='spring'?32:type==='crusher'?72:40})}}
    function reset(){cancelAnimationFrame(raf);phase='angle';paused=false;angle=.45;angleDir=1;power=0;powerDir=1;holding=false;camera=0;time=0;blocked=false;bounces=0;truckX=-360;hitFlash=0;boostFx=0;baseDistance=100;bonusDistance=0;distanceValue=0;particles=[];car.x=180;car.y=ground()-car.h/2;car.vx=car.vy=car.vr=car.rot=0;buildObstacles();$('#resultOverlay').classList.add('hidden');$('#pauseOverlay').classList.add('hidden');$('#launchUi').classList.remove('hidden');$('#distance').textContent=fmt(0);updateLaunchText();last=performance.now();raf=requestAnimationFrame(loop)}
    function updateLaunchText(){if(!$)return;if(lang==='ko'){$('#instruction').textContent=phase==='power'?'부채꼴 게이지가 100%에 가까울 때 떼세요!':'누르면 방향이 고정되고 파워 충전이 시작됩니다';$('#holdBtn').textContent=phase==='power'?'원하는 파워에서 떼기':'누르고 있기'}else{let powerMode=phase==='power';$('#instruction').textContent=tx(powerMode?'powerHelp':'angleHelp');$('#holdBtn').textContent=tx(powerMode?'powerButton':'angleButton')}}
    function startHold(e){e.preventDefault();if(phase==='angle'){phase='power';power=0;powerDir=1;holding=true;updateLaunchText();return}if(phase==='power')holding=true}
    function endHold(e){if(e)e.preventDefault();if(phase==='power'&&holding){holding=false;launch()}}
    function launch(){phase='truck';$('#launchUi').classList.add('hidden');truckX=-380;baseDistance=100+19900*power*(.65+.35*Math.sin(angle*2))}
    function performLaunch(){phase='flight';car.x=180;let p=.42+power*.78;car.vx=(580+power*620)*Math.cos(angle)*p;car.vy=-(630+power*720)*Math.sin(angle)*p;car.vr=5.5+power*8.5;burst(car.x-58,ground()-25,'#ffd23f',38);hitFlash=1}
    function burst(x,y,color,count=14){for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*330,vy:-Math.random()*260,life:.45+Math.random()*.5,color,size:3+Math.random()*7})}
    function toast(key){let el=$('#toast');el.textContent=tx(key)+(key==='springHit'||key==='boostHit'?'  ×45!!!':'');el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800)}
    function collide(o){if(o.used)return;let sx=worldToScreen(o.x),cx=worldToScreen(car.x);if(Math.abs(sx-cx)<(o.w+car.w)*.43&&car.y+car.h*.35>ground()-o.h){o.used=true;if(o.type==='crusher'){toast('crusherHit');burst(car.x,ground()-40,'#ff4d4d',45);finish(true);return}if(o.type==='oil'){blocked=true;car.vx*=.72;toast('oilHit');burst(car.x,ground()-20,'#14213d');return}if(blocked){blocked=false;toast('blocked');burst(car.x,ground()-25,'#777');return}let jackpot=Math.max(baseDistance,100)*44;bonusDistance+=jackpot;distanceValue+=jackpot;boostFx=2.8;hitFlash=1;if(o.type==='spring'){car.vy=-2600;car.vx=Math.min(car.vx*10,12000);car.vr+=18;toast('springHit');burst(car.x,ground()-30,'#35c78a',90)}else{car.vx=Math.min(car.vx*14,15000);car.vy=Math.min(car.vy,-900);car.vr+=22;toast('boostHit');burst(car.x,ground()-25,'#ff8a00',100)}$('#distance').textContent=fmt(distanceValue)}}
    function physics(dt){time+=dt;if(phase==='angle'){angle+=angleDir*dt*1.18;if(angle>.98||angle<.25){angle=Math.max(.25,Math.min(.98,angle));angleDir*=-1}}else if(phase==='power'){power+=powerDir*dt*1.15;if(power>1||power<0){power=Math.max(0,Math.min(1,power));powerDir*=-1}}else if(phase==='truck'){truckX+=dt*920;if(truckX>=-7){truckX=-7;performLaunch()}}else if(phase==='flight'){car.vy+=520*dt;car.x+=car.vx*dt;car.y+=car.vy*dt;car.rot+=car.vr*dt;car.vx*=Math.pow(.996,dt*60);car.vr*=Math.pow(.997,dt*60);if(car.y+car.h/2>=ground()){car.y=ground()-car.h/2;if(Math.abs(car.vy)>150&&car.vx>105&&bounces<12){car.vy=-Math.abs(car.vy)*(.48+Math.random()*.12);car.vx*=.86;car.vr+=(car.vr>=0?1:-1)*2.8;bounces++;burst(car.x,ground()-8,'#d59d61');toast('groundHit')}else{car.vy=0;car.vx*=Math.pow(.91,dt*60);car.rot*=.92;if(car.vx<32)finish(false)}}obstacles.forEach(collide);camera+=(Math.max(0,car.x-W*.34)-camera)*Math.min(1,dt*4.2);let progress=1-Math.exp(-Math.max(0,car.x-180)/1500);distanceValue=Math.max(distanceValue,(baseDistance+bonusDistance)*progress);$('#distance').textContent=fmt(distanceValue)}}
    function finish(crushed){if(phase==='result')return;phase='result';let dist=crushed?Math.max(distanceValue,0):baseDistance+bonusDistance,isNew=dist>best;if(isNew){best=dist;localStorage.setItem('carstudioSkyBest',String(best))}$('#best').textContent=fmt(best);$('#finalDistance').textContent=fmt(dist);$('#newRecord').textContent=tx(isNew?'newRecord':'record').replace('{d}',fmt(best));$('#resultCopy').textContent=tx('resultText').replace('{car}',carData.name).replace('{d}',fmt(dist));$('#resultOverlay').classList.remove('hidden');$('#shareBtn').dataset.distance=fmt(dist)}
    function rounded(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}
    function drawSpeedFx(){if(boostFx<=0)return;ctx.save();ctx.globalAlpha=Math.min(1,boostFx);ctx.strokeStyle='#fff';ctx.lineWidth=5;for(let i=0;i<28;i++){let y=(i*79+time*900)%(H+80)-40,x=(i*173+time*1300)%W;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-100-Math.random()*180,y+Math.random()*16-8);ctx.stroke()}ctx.globalAlpha=Math.min(1,boostFx*.8);ctx.fillStyle='#ff4d4d';ctx.textAlign='center';ctx.font=`1000 ${Math.min(120,W*.14)}px sans-serif`;ctx.fillText('×45 BOOST!',W/2,H*.32);ctx.restore()}
    function drawSky(){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#72d8ff');g.addColorStop(1,'#eafaff');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,.85)';for(let i=0;i<8;i++){let x=((i*330-camera*.08)%(W+400))-120,y=100+(i%3)*90;ctx.beginPath();ctx.arc(x,y,34,0,7);ctx.arc(x+38,y-12,45,0,7);ctx.arc(x+84,y,30,0,7);ctx.fill()}let layers=[{c:'#8bd5a6',s:.09,y:ground()-130},{c:'#45bd84',s:.18,y:ground()-72}];layers.forEach((l,j)=>{ctx.fillStyle=l.c;ctx.beginPath();ctx.moveTo(0,H);for(let x=-100;x<W+120;x+=120){let wx=x+camera*l.s,hh=55+seedRandom(Math.floor(wx/120)+j*99)*100;ctx.lineTo(x,l.y-hh);ctx.quadraticCurveTo(x+60,l.y-hh-35,x+120,l.y)}ctx.lineTo(W,H);ctx.fill()});ctx.fillStyle='#f3d69d';ctx.fillRect(0,ground(),W,H-ground());ctx.fillStyle='#26364f';ctx.fillRect(0,ground(),W,9);ctx.strokeStyle='#fff7d6';ctx.lineWidth=6;ctx.setLineDash([45,35]);ctx.beginPath();ctx.moveTo(0,ground()+42);ctx.lineTo(W,ground()+42);ctx.stroke();ctx.setLineDash([])}
    function drawObstacle(o){let x=worldToScreen(o.x),y=ground();if(x<-120||x>W+120||o.used)return;ctx.save();ctx.translate(x,y);ctx.lineWidth=4;ctx.strokeStyle='#14213d';if(o.type==='spring'){ctx.fillStyle='#35c78a';rounded(-44,-16,88,16,5);ctx.fill();ctx.stroke();ctx.strokeStyle='#14213d';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(-30,-16);ctx.lineTo(-18,-40);ctx.lineTo(-5,-16);ctx.lineTo(8,-40);ctx.lineTo(21,-16);ctx.lineTo(34,-40);ctx.stroke();ctx.fillStyle='#fff';ctx.font='900 16px sans-serif';ctx.fillText('UP!',-15,-49)}else if(o.type==='boost'){ctx.rotate(-.12);ctx.fillStyle='#ff8a00';rounded(-31,-57,62,57,9);ctx.fill();ctx.stroke();ctx.fillStyle='#ffd23f';ctx.fillRect(-31,-43,62,13);ctx.fillRect(-31,-18,62,10);ctx.fillStyle='#14213d';ctx.font='1000 19px sans-serif';ctx.fillText('×45',-21,-24);ctx.fillStyle='#ff4d4d';ctx.beginPath();ctx.moveTo(-18,0);ctx.lineTo(-5,19);ctx.lineTo(2,0);ctx.lineTo(14,22);ctx.lineTo(22,0);ctx.fill()}else if(o.type==='oil'){ctx.fillStyle='#273043';ctx.beginPath();ctx.ellipse(0,-5,48,13,0,0,7);ctx.fill();ctx.stroke();ctx.fillStyle='#777';ctx.beginPath();ctx.arc(-18,-25,19,0,7);ctx.fill();ctx.stroke();ctx.fillStyle='#ffcf33';ctx.font='1000 18px sans-serif';ctx.fillText('!',-22,-19)}else{ctx.fillStyle='#e8edf2';rounded(-42,-70,84,70,6);ctx.fill();ctx.stroke();ctx.fillStyle='#ff4d4d';for(let i=-28;i<=28;i+=28){ctx.beginPath();ctx.moveTo(i-10,-70);ctx.lineTo(i,-91);ctx.lineTo(i+10,-70);ctx.fill();ctx.stroke()}ctx.fillStyle='#14213d';ctx.font='900 25px sans-serif';ctx.fillText('☠',-15,-25)}ctx.restore()}
    function drawCar(x,y,rot,scale=1){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.scale(scale,scale);ctx.shadowColor='rgba(20,33,61,.48)';ctx.shadowBlur=10;ctx.shadowOffsetY=8;if(carImg.complete&&carImg.naturalWidth){ctx.globalCompositeOperation='multiply';ctx.filter='saturate(1.32) contrast(1.12)';ctx.drawImage(carImg,-78,-45,156,90);ctx.filter='none';ctx.globalCompositeOperation='source-over'}else{ctx.fillStyle='#2f80ed';ctx.beginPath();ctx.moveTo(-68,22);ctx.lineTo(-50,-18);ctx.lineTo(20,-30);ctx.lineTo(68,-3);ctx.lineTo(63,26);ctx.closePath();ctx.fill();ctx.strokeStyle='#14213d';ctx.lineWidth=4;ctx.stroke()}ctx.fillStyle='rgba(20,33,61,.86)';ctx.font='900 9px sans-serif';ctx.textAlign='center';ctx.fillText(carData.name,0,39);ctx.restore()}
    function drawTruck(){let x=truckX,y=ground()-54;ctx.save();ctx.translate(x,y);ctx.fillStyle='#ffcf33';ctx.strokeStyle='#14213d';ctx.lineWidth=4;rounded(-110,-45,150,70,8);ctx.fill();ctx.stroke();ctx.fillStyle='#ff6b35';rounded(30,-34,85,59,8);ctx.fill();ctx.stroke();ctx.fillStyle='#8fe2ff';ctx.fillRect(50,-24,40,24);ctx.strokeRect(50,-24,40,24);ctx.fillStyle='#14213d';[ -70,65].forEach(v=>{ctx.beginPath();ctx.arc(v,25,18,0,7);ctx.fill()});ctx.fillStyle='#14213d';ctx.font='1000 17px sans-serif';ctx.fillText('LAUNCH!',-95,-5);ctx.restore()}
    function drawLaunchGauge(){let ox=180,oy=ground()-car.h/2-12,r=118;ctx.save();ctx.translate(ox,oy);ctx.lineCap='round';ctx.strokeStyle='#14213d';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(r+18,0);ctx.moveTo(0,0);ctx.lineTo(0,-r-18);ctx.stroke();ctx.fillStyle='rgba(255,210,63,.3)';ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,Math.max(10,r*power),-angle,0);ctx.closePath();ctx.fill();ctx.strokeStyle=power>.82?'#ff4d4d':'#ffd23f';ctx.lineWidth=14;ctx.beginPath();ctx.arc(0,0,Math.max(10,r*power),-angle,0);ctx.stroke();ctx.rotate(-angle);ctx.strokeStyle='#ff4d4d';ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(r,0);ctx.stroke();ctx.fillStyle='#ff4d4d';ctx.beginPath();ctx.moveTo(r+7,0);ctx.lineTo(r-14,-11);ctx.lineTo(r-14,11);ctx.closePath();ctx.fill();ctx.restore();ctx.save();ctx.fillStyle='#14213d';ctx.font='1000 18px sans-serif';ctx.fillText(Math.round(power*100)+'%',ox+18,oy-18);ctx.font='900 12px sans-serif';ctx.fillText('0%',ox+8,oy+22);ctx.fillText('100%',ox-30,oy-r-23);ctx.restore()}
    function render(){ctx.clearRect(0,0,W,H);drawSky();drawSpeedFx();obstacles.forEach(drawObstacle);particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(worldToScreen(p.x),p.y,p.size,p.size)});ctx.globalAlpha=1;if(phase==='angle'||phase==='power'||phase==='truck'){drawCar(180,ground()-car.h/2,0);if(phase==='truck'||truckX>-350)drawTruck();if(phase==='angle'||phase==='power')drawLaunchGauge()}else drawCar(worldToScreen(car.x),car.y,car.rot);if(hitFlash>0){ctx.fillStyle=`rgba(255,255,255,${hitFlash*.7})`;ctx.fillRect(0,0,W,H);hitFlash*=.82}}
    function loop(now){let dt=Math.min(.033,(now-last)/1000||0);last=now;if(!paused){physics(dt);boostFx=Math.max(0,boostFx-dt);particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=420*dt;p.life-=dt});particles=particles.filter(p=>p.life>0)}render();raf=requestAnimationFrame(loop)}
    function togglePause(force){if(phase==='result'||phase==='angle'||phase==='power')return;paused=force===undefined?!paused:force;$('#pauseOverlay').classList.toggle('hidden',!paused)}
    async function share(){let d=$('#shareBtn').dataset.distance,text=tx('shareText').replace('{car}',carData.name).replace('{d}',d);try{if(navigator.share)await navigator.share({title:'Car Studio · Sky Launch',text,url:location.href});else{await navigator.clipboard.writeText(text+' '+location.href);toast('copied')}}catch(e){}}
    $('#holdBtn').addEventListener('pointerdown',startHold);window.addEventListener('pointerup',endHold);$('#retryBtn').onclick=reset;$('#againBtn').onclick=reset;$('#pauseBtn').onclick=()=>togglePause();$('#resumeBtn').onclick=()=>togglePause(false);$('#backBtn').onclick=()=>{if(history.length>1)history.back();else location.href='index.html'};$('#shareBtn').onclick=share;$('#langSelect').onchange=e=>{lang=e.target.value;localStorage.setItem('carstudioGameLang',lang);applyLang()};window.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();if(e.repeat)return;startHold(e)}if(e.key==='Escape')togglePause()});window.addEventListener('keyup',e=>{if(e.code==='Space')endHold(e)});window.addEventListener('resize',resize);resize();applyLang();$('#best').textContent=fmt(best);reset();
  })();
  </script>
